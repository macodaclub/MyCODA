name: Reload ontology

on:
  push:
    branches:
      - main
    paths:
      - "ontologies/MaCODA.owl"

jobs:
  reload:
    runs-on: self-hosted

    steps:
      - name: Reload ontology in running backend
        env:
          RELOAD_SECRET: ${{ secrets.RELOAD_ONTOLOGY_SECRET }}
        run: |
          curl -fsS -X POST "https://mycoda.iscte-iul.pt/api/webhooks/github/reload-ontology" \
            -H "X-Reload-Secret: ${RELOAD_SECRET}"